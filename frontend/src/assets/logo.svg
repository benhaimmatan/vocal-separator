<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with magical glow -->
  <circle cx="60" cy="60" r="58" fill="url(#logoGradient)" stroke="url(#glowGradient)" stroke-width="2"/>
  
  <!-- Alchemy Circle Elements -->
  <circle cx="60" cy="60" r="45" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="60" cy="60" r="35" stroke="white" stroke-width="1" opacity="0.2"/>
  
  <!-- Sound Wave Elements -->
  <path d="M30 60 Q 45 30 60 60 T 90 60" stroke="white" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M35 60 Q 47 40 60 60 T 85 60" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M40 60 Q 50 45 60 60 T 80 60" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Alchemy Symbol (stylized A) -->
  <path d="M45 75 L60 35 L75 75 M50 65 L70 65" 
        stroke="white" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Magical Sparkles -->
  <circle cx="40" cy="45" r="2" fill="white" opacity="0.8"/>
  <circle cx="80" cy="45" r="2" fill="white" opacity="0.8"/>
  <circle cx="60" cy="85" r="2" fill="white" opacity="0.8"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
</svg> 